<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQI Map Sample</title>
    <style>
        :root {
            --aqi-good: #22C55E;
            --aqi-moderate: #EAB308;
            --aqi-sensitive: #F97316;
            --aqi-unhealthy: #EF4444;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .map-container {
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), 
                        url('https://picsum.photos/seed/foggy-city/1920/1080?grayscale&blur=5');
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Top Search Bar */
        .top-bar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            height: 60px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            display: flex;
            align-items: center;
            padding: 0 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            z-index: 100;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-right: 10px;
            transition: transform 0.2s;
        }

        .back-btn:active {
            transform: scale(0.9);
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-size: 16px;
            color: #333;
            padding-right: 20px;
        }

        .search-input::placeholder {
            color: #666;
        }

        /* AQI Bubbles */
        .aqi-bubble {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid white;
        }

        .aqi-bubble:hover {
            transform: scale(1.2);
            z-index: 10;
        }

        .bubble-good { background-color: var(--aqi-good); }
        .bubble-moderate { background-color: var(--aqi-moderate); }
        .bubble-sensitive { background-color: var(--aqi-sensitive); }
        .bubble-unhealthy { background-color: var(--aqi-unhealthy); }

        /* Legend Card */
        .legend-card {
            position: absolute;
            right: 20px;
            top: 100px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            width: 180px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            z-index: 90;
        }

        .legend-title {
            font-size: 12px;
            font-weight: 800;
            color: #444;
            margin-bottom: 15px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 12px;
        }

        .legend-label {
            font-size: 11px;
            font-weight: 700;
            color: #555;
            text-transform: uppercase;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .legend-card {
                top: auto;
                bottom: 40px;
                right: 20px;
                width: 150px;
                padding: 15px;
            }
            .top-bar {
                top: 15px;
            }
        }
    </style>
</head>
<body>

<div class="map-container">
    <!-- Top Search Bar -->
    <div class="top-bar">
        <button class="back-btn" onclick="alert('Back clicked')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </button>
        <input type="text" class="search-input" placeholder="Enter the location your are looking for">
    </div>

    <!-- AQI Bubbles -->
    <div class="aqi-bubble bubble-good" style="top: 30%; left: 20%;">45</div>
    <div class="aqi-bubble bubble-moderate" style="top: 45%; left: 55%;">68</div>
    <div class="aqi-bubble bubble-sensitive" style="top: 60%; left: 35%;">112</div>
    <div class="aqi-bubble bubble-unhealthy" style="top: 25%; left: 75%;">155</div>
    <div class="aqi-bubble bubble-good" style="top: 75%; left: 80%;">32</div>

    <!-- Legend Card -->
    <div class="legend-card">
        <div class="legend-title">AQI LEGEND</div>
        <div class="legend-item">
            <div class="legend-dot" style="background-color: var(--aqi-good);"></div>
            <div class="legend-label">Good</div>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background-color: var(--aqi-moderate);"></div>
            <div class="legend-label">Moderate</div>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background-color: var(--aqi-sensitive);"></div>
            <div class="legend-label">Sensitive</div>
        </div>
        <div class="legend-item">
            <div class="legend-dot" style="background-color: var(--aqi-unhealthy);"></div>
            <div class="legend-label">Unhealthy</div>
        </div>
    </div>
</div>

<script>
    // Simple interactivity
    document.querySelectorAll('.aqi-bubble').forEach(bubble => {
        bubble.addEventListener('click', () => {
            const aqi = bubble.innerText;
            alert(`AQI Level: ${aqi}`);
        });
    });
</script>

</body>
</html>
